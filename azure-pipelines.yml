# azure-pipelines.yml
# Auto-generated by the GitHub Push MCP Server.
# Runs Playwright tests from src/tests/ on an Ubuntu agent.
# Triggers on any push to branches matching: feature/generated-tests-*

trigger:
  branches:
    include:
      - feature/generated-tests-*

pr:
  branches:
    include:
      - feature/generated-tests-*

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Comma-separated list of spec files to run.
  # Leave empty to run all tests under src/tests/.
  TEST_SCRIPTS: ''

steps:
  - task: NodeTool@0
    displayName: 'Install Node.js 18'
    inputs:
      versionSpec: '18.x'

  - script: npm ci
    displayName: 'Install npm dependencies'

  - script: npx playwright install --with-deps chromium
    displayName: 'Install Playwright browsers'

  - bash: |
      if [ -n "$(TEST_SCRIPTS)" ]; then
        echo "Running selected scripts: $(TEST_SCRIPTS)"
        npx playwright test $(TEST_SCRIPTS) \
          --config=config/playwright.config.js \
          --project=chromium \
          --reporter=junit,html
      else
        echo "Running all tests under src/tests/"
        npx playwright test src/tests/ \
          --config=config/playwright.config.js \
          --project=chromium \
          --reporter=junit,html
      fi
    displayName: 'Run Playwright tests'
    continueOnError: true
    env:
      HEADLESS: 'true'
      CI: 'true'

  - task: PublishTestResults@2
    displayName: 'Publish JUnit test results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results/**/*.xml'
      mergeTestResults: true
      testRunTitle: 'Playwright — $(Build.SourceBranchName)'
      failTaskOnFailedTests: false

  - task: PublishPipelineArtifact@1
    displayName: 'Upload test-results artifact'
    condition: always()
    inputs:
      targetPath: 'test-results'
      artifact: 'test-results-$(Build.BuildNumber)'
      publishLocation: 'pipeline'

  - task: PublishPipelineArtifact@1
    displayName: 'Upload Playwright HTML report'
    condition: always()
    inputs:
      targetPath: 'playwright-report'
      artifact: 'playwright-report-$(Build.BuildNumber)'
      publishLocation: 'pipeline'
