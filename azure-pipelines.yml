# azure-pipelines.yml
# Auto-generated by the GitHub Push MCP Server.
# Runs Playwright tests from src/tests/ on an Ubuntu agent.
# NOTE: Manual triggering only (via azure_trigger_pipeline). No automatic triggers.

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Comma-separated list of spec files to run.
  # Leave empty to run all tests under src/tests/.
  TEST_SCRIPTS: ''

steps:
  - task: NodeTool@0
    displayName: 'Install Node.js 18'
    inputs:
      versionSpec: '18.x'

  - bash: |
      if [[ "$AGENT_OS" == "Linux" ]]; then
        apt-get update && apt-get install -y build-essential python3 || true
      fi
    displayName: 'Install build tools (Linux only)'
    continueOnError: true

  - script: npm ci --legacy-peer-deps --ignore-scripts
    displayName: 'Install npm dependencies (with flags for compatibility)'
    continueOnError: true

  - script: npm rebuild 2>/dev/null || true
    displayName: 'Rebuild native modules (if needed)'
    continueOnError: true

  - script: npx playwright install --with-deps chromium
    displayName: 'Install Playwright browsers'
    continueOnError: true

  - bash: |
      if [ -n "$(TEST_SCRIPTS)" ]; then
        echo "Running selected scripts: $(TEST_SCRIPTS)"
        # Try with config first, fall back to defaults if missing
        if [ -f "config/playwright.config.js" ]; then
          npx playwright test $(TEST_SCRIPTS)             --config=config/playwright.config.js             --reporter=junit,html
        else
          echo "Config file not found at config/playwright.config.js, running with defaults..."
          npx playwright test $(TEST_SCRIPTS)             --reporter=junit,html
        fi
      else
        echo "Running all tests under src/tests/"
        # Try with config first, fall back to defaults if missing
        if [ -f "config/playwright.config.js" ]; then
          npx playwright test src/tests/             --config=config/playwright.config.js             --reporter=junit,html
        else
          echo "Config file not found at config/playwright.config.js, running with defaults..."
          npx playwright test src/tests/             --reporter=junit,html
        fi
      fi
    displayName: 'Run Playwright tests'
    continueOnError: true
    env:
      HEADLESS: 'true'
      CI: 'true'

  - task: PublishTestResults@2
    displayName: 'Publish JUnit test results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results/**/*.xml'
      mergeTestResults: true
      testRunTitle: 'Playwright — $(Build.SourceBranchName)'
      failTaskOnFailedTests: false

  - task: PublishPipelineArtifact@1
    displayName: 'Upload test-results artifact'
    condition: always()
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/test-results'
      artifact: 'test-results-$(Build.BuildNumber)'
      publishLocation: 'pipeline'
    continueOnError: true

  - task: PublishPipelineArtifact@1
    displayName: 'Upload Playwright HTML report'
    condition: always()
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/test-results/playwright-report'
      artifact: 'playwright-report-$(Build.BuildNumber)'
      publishLocation: 'pipeline'
    continueOnError: true
